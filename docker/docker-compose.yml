version: "3.8"

services:
  ros2_dev:
    build: .
    container_name: ros2_dev

    network_mode: host
    ipc: host


    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [ gpu ]

    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all



    volumes:
      - ../workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix

    runtime: nvidia

    tty: true